services:
  postgres:
    image: postgres:16
    container_name: verbatim_test_db
    environment:
      POSTGRES_DB: verbatim_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    ports:
      - "5433:5432"
    volumes:
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d verbatim_test"]
      interval: 2s
      timeout: 5s
      retries: 10
