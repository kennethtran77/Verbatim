services:
  postgres:
    image: postgres:16
    container_name: verbatim_dev_db
    environment:
      POSTGRES_DB: verbatim_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_pass
    ports:
      - "5432:5432"
    volumes:
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - verbatim_dev_data:/var/lib/postgresql/data

volumes:
  verbatim_dev_data:
